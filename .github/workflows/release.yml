name: OrchardSeal Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate, package, and publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libssl-dev
      - name: Verify tag version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(sed -nE 's/^[[:space:]]*VERSION[[:space:]]+([0-9]+(\.[0-9]+)+).*/\1/p' CMakeLists.txt | head -n 1)"
          test -n "$project_version"
          test "$tag_version" = "$project_version"
          git fetch --force --no-tags origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = "tag"
          grep -Fqx "## [$tag_version]" CHANGELOG.md
      - name: Configure
        run: >-
          cmake -S . -B build/release
          -DCMAKE_BUILD_TYPE=Release
          -DORCHARDSEAL_BUILD_TESTS=ON
          -DORCHARDSEAL_WARNINGS_AS_ERRORS=ON
      - name: Build
        run: cmake --build build/release --parallel
      - name: Test
        run: ctest --test-dir build/release --output-on-failure
      - name: Package source archive
        run: scripts/package.sh "${GITHUB_REF_NAME#v}"
      - name: Verify source checksum
        run: |
          cd dist
          sha256sum --check "OrchardSeal-${GITHUB_REF_NAME#v}.tar.gz.sha256"
      - name: Prepare release notes from changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## [" version "]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > dist/release-notes.md
          test -s dist/release-notes.md
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          files=("dist/OrchardSeal-${version}.tar.gz" "dist/OrchardSeal-${version}.tar.gz.sha256")
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file dist/release-notes.md --title "OrchardSeal ${version}"
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --notes-file dist/release-notes.md \
              --title "OrchardSeal ${version}"
          fi
